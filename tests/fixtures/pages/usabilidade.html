<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Fixture de Usabilidade</title>
  </head>
  <body>
    <main>
      <h1>Painel de usabilidade</h1>
      <p>Revise os dados principais antes de continuar.</p>
      <p>Campos obrigatorios aparecem com rotulo visivel.</p>

      <nav>
        <a href="/ajuda">Central de ajuda</a>
        <a href="https://example.com/termos">Termos de uso</a>
      </nav>

      <form action="/cadastro" method="post">
        <label for="nome">Nome completo</label>
        <input id="nome" name="nome" type="text" />

        <label for="email">Email corporativo</label>
        <input id="email" name="email" type="email" />

        <label for="perfil">Perfil de acesso</label>
        <select id="perfil" name="perfil">
          <option value="analista">Analista</option>
          <option value="gestor">Gestor</option>
        </select>

        <button type="submit">Enviar cadastro</button>
        <input type="button" value="Limpar formulario" />
      </form>
    </main>
  </body>
</html>
